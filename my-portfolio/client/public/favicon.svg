<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a0e"/>
  <!-- Unit cell: isometric cube, clean lines -->
  <path d="M16 5 L27 11 L27 23 L16 29 L5 23 L5 11 Z" fill="none" stroke="#c9a961" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Internal edges for 3D depth -->
  <line x1="16" y1="5" x2="16" y2="17" stroke="#c9a961" stroke-width="1" opacity="0.4"/>
  <line x1="5" y1="11" x2="16" y2="17" stroke="#c9a961" stroke-width="1" opacity="0.4"/>
  <line x1="27" y1="11" x2="16" y2="17" stroke="#c9a961" stroke-width="1" opacity="0.4"/>
  <!-- Vertex atoms -->
  <circle cx="16" cy="5" r="2" fill="#c9a961"/>
  <circle cx="27" cy="11" r="2" fill="#c9a961" opacity="0.7"/>
  <circle cx="27" cy="23" r="2" fill="#c9a961" opacity="0.7"/>
  <circle cx="16" cy="29" r="2" fill="#c9a961"/>
  <circle cx="5" cy="23" r="2" fill="#c9a961" opacity="0.7"/>
  <circle cx="5" cy="11" r="2" fill="#c9a961"/>
  <!-- Center atom — the hero -->
  <circle cx="16" cy="17" r="3" fill="#d4af37"/>
</svg>
