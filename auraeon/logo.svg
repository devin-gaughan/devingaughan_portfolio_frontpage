<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#0a0a0e"/>
  <!-- Orion's belt: 3 stars on upper-right diagonal -->
  <circle cx="22" cy="4.5" r="1" fill="#e5e4e2"/>
  <circle cx="25" cy="6.5" r="1" fill="#e5e4e2"/>
  <circle cx="28" cy="8.5" r="1" fill="#e5e4e2"/>
  <!-- Bow legs of the A: two curved strokes meeting at apex -->
  <path d="M 16 6 Q 9 14 5 27" stroke="#c9a961" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 16 6 Q 23 14 27 27" stroke="#c9a961" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow shaft (the A's crossbar) -->
  <line x1="10" y1="18" x2="22" y2="18" stroke="#d4af37" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Arrowhead pointing right -->
  <path d="M 22 18 L 19 16 L 19 20 Z" fill="#d4af37"/>
  <!-- Fletching on the left -->
  <path d="M 10 18 L 7.5 16 M 10 18 L 7.5 20" stroke="#d4af37" stroke-width="0.9" stroke-linecap="round"/>
</svg>
